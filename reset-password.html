<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olah Uang — Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .soft-card { box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06); }
    .brand-icon { box-shadow: 0 18px 34px rgba(5, 150, 105, .24); }
    input:focus { outline: none; border-color: #059669; box-shadow: 0 0 0 4px rgba(5,150,105,.12); }
    .btn-primary { background: linear-gradient(135deg, #059669, #047857); transition: transform .18s ease, box-shadow .18s ease, filter .18s ease; }
    .btn-primary:hover { filter: brightness(.98); transform: translateY(-1px); box-shadow: 0 14px 28px rgba(5, 150, 105, .22); }
    .btn-primary:disabled { opacity: .65; transform: none; box-shadow: none; cursor: not-allowed; }

    .dark body, body.dark { background: #020617 !important; color: #e5e7eb !important; }
    .dark .bg-white { background-color: #0f172a !important; }
    .dark .bg-gray-50 { background-color: #020617 !important; }
    .dark .bg-gray-100 { background-color: #1e293b !important; }
    .dark .text-gray-900, .dark .text-gray-800, .dark .text-gray-700 { color: #f8fafc !important; }
    .dark .text-gray-600, .dark .text-gray-500, .dark .text-gray-400 { color: #94a3b8 !important; }
    .dark .border-gray-50, .dark .border-gray-100, .dark .border-gray-200 { border-color: #1e293b !important; }
    .dark input { background-color: #111827 !important; color: #e5e7eb !important; border-color: #334155 !important; }
    .dark .soft-card { box-shadow: 0 8px 28px rgba(0, 0, 0, .25); }
  </style>
</head>
<body data-page="reset-password" class="min-h-screen bg-gray-50 text-gray-800 antialiased overflow-x-hidden">
  <main class="relative flex min-h-screen w-full items-center justify-center px-4 py-6">
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div class="absolute -top-24 -left-24 h-72 w-72 rounded-full bg-emerald-200/50 blur-3xl"></div>
      <div class="absolute top-24 right-0 h-80 w-80 rounded-full bg-emerald-100/70 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-rose-100/50 blur-3xl"></div>
    </div>

    <section class="w-full max-w-md">
      <div class="mb-6 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="brand-icon flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-800 text-2xl text-white">💵</div>
          <div>
            <p class="text-base font-extrabold leading-tight text-gray-900">Olah Uang</p>
            <p class="text-xs text-gray-400">Reset password akun</p>
          </div>
        </div>
        <button onclick="toggleDarkMode()" id="darkModeToggle" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl border border-gray-100 bg-white text-base font-bold text-gray-700 soft-card transition hover:scale-[1.02]" title="Mode gelap/terang" aria-label="Mode gelap/terang">🌕</button>
      </div>

      <div class="rounded-[2rem] border border-gray-100 bg-white p-6 soft-card">
        <div class="mb-5">
          <h1 class="text-2xl font-extrabold text-gray-900">Buat password baru</h1>
          <p id="resetPasswordNotice" class="mt-2 text-sm leading-6 text-gray-400">Masukkan password baru untuk akunmu.</p>
        </div>

        <div class="space-y-4">
          <div>
            <label for="resetNewPassword" class="mb-2 block text-xs font-extrabold uppercase tracking-wide text-gray-500">Password Baru</label>
            <input id="resetNewPassword" type="password" autocomplete="new-password" placeholder="Minimal 6 karakter"
              class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-800 transition" />
          </div>
          <div>
            <label for="resetConfirmPassword" class="mb-2 block text-xs font-extrabold uppercase tracking-wide text-gray-500">Ulangi Password Baru</label>
            <input id="resetConfirmPassword" type="password" autocomplete="new-password" placeholder="Ulangi password baru"
              class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm text-gray-800 transition"
              onkeydown="if(event.key==='Enter') doUpdatePassword()" />
          </div>
        </div>

        <button onclick="doUpdatePassword()" class="btn-primary mt-6 w-full rounded-2xl py-4 text-sm font-extrabold text-white cursor-pointer">Simpan Password Baru</button>
        <a href="index.html" class="mt-4 block text-center text-xs font-extrabold text-emerald-600 hover:text-emerald-700">Kembali ke halaman login</a>
      </div>
    </section>
  </main>

  <script src="./script.js?v=20260619-v35-forgot-account"></script>
</body>
</html>
