<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — Olah Uang</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .tab-active { color: #111827; border-bottom: 2px solid #059669; font-weight: 600; }
    .tab-inactive { color: #9ca3af; border-bottom: 2px solid transparent; }
    input:focus { outline: none; border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,.12); }
    .btn-primary { background: #059669; transition: background .2s; }
    .btn-primary:hover { background: #047857; }
  </style>
</head>
<body data-page="login" class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <main class="w-full max-w-sm">
    <section class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-600 mb-4 shadow-lg shadow-emerald-200">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Olah Uang</h1>
      <p class="text-sm text-gray-400 mt-1">Kelola pemasukan dan pengeluaran multi-user</p>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="flex border-b border-gray-100">
        <button id="tabMasuk" onclick="gantitab('masuk')" class="tab-active flex-1 py-4 text-sm transition-all cursor-pointer">Masuk</button>
        <button id="tabDaftar" onclick="gantitab('daftar')" class="tab-inactive flex-1 py-4 text-sm transition-all cursor-pointer">Daftar</button>
      </div>

      <div class="p-6">
        <div id="formMasuk">
          <div class="space-y-4">
            <div>
              <label for="loginEmail" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Email</label>
              <input id="loginEmail" type="email" autocomplete="email" placeholder="kamu@email.com"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 transition" />
            </div>
            <div>
              <label for="loginPassword" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Password</label>
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 transition"
                onkeydown="if(event.key==='Enter') doLogin()" />
            </div>
          </div>
          <button onclick="doLogin()" class="btn-primary w-full mt-6 py-3 rounded-xl text-white text-sm font-semibold cursor-pointer">
            Masuk
          </button>
        </div>

        <div id="formDaftar" class="hidden">
          <div class="space-y-4">
            <div>
              <label for="daftarNama" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Nama Lengkap</label>
              <input id="daftarNama" type="text" autocomplete="name" placeholder="Nama kamu"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 transition" />
            </div>
            <div>
              <label for="daftarEmail" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Email</label>
              <input id="daftarEmail" type="email" autocomplete="email" placeholder="kamu@email.com"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 transition" />
            </div>
            <div>
              <label for="daftarPassword" class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wide">Password</label>
              <input id="daftarPassword" type="password" autocomplete="new-password" placeholder="Minimal 6 karakter"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-800 transition"
                onkeydown="if(event.key==='Enter') doRegister()" />
            </div>
          </div>
          <button onclick="doRegister()" class="btn-primary w-full mt-6 py-3 rounded-xl text-white text-sm font-semibold cursor-pointer">
            Buat Akun
          </button>
        </div>
      </div>
    </section>

    <p class="text-center text-xs text-gray-400 mt-6">Keamanan data bergantung pada Supabase RLS, bukan cuma tampilan login.</p>
  </main>

  <script src="/script.js?v=20260618-v3-cachefix"></script>
</body>
</html>
